esphome:
  name: esphome-web-c042c4
  friendly_name: Docky

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret smartdisplay_api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  - id: lcd
    clk_pin: GPIO14
    mosi_pin: GPIO13

  - id: touch_bus
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

output:
  - platform: ledc
    pin: GPIO21
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

display:
  - platform: mipi_spi
    id: my_display
    spi_id: lcd
    model: ESP32-2432S028-7789
    cs_pin:
      number: GPIO15
      ignore_strapping_warning: true
    dc_pin:
      number: GPIO2
      ignore_strapping_warning: true
    reset_pin:
      number: GPIO12
      ignore_strapping_warning: true
    color_order: bgr
    invert_colors: false
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: xpt2046
    id: ts_touch
    display: my_display
    spi_id: touch_bus
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false

font:
  - file: "gfonts://Elms+Sans@700"
    id: font_time
    size: 90
    bpp: 4
    glyphs: "0123456789: "

  - file: "gfonts://Elms+Sans@600"
    id: font_label
    size: 18
    bpp: 4
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz :&@!,.?\"'%()+-_/°"

  - file: "gfonts://Elms+Sans@400"
    id: font_sub
    size: 20
    bpp: 4
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz :&@!,.?\"'%()+-_/°"

  # Weather condition fonts.
  # The script dynamically chooses between these so the condition text fits.
  - file: "gfonts://Elms+Sans@400"
    id: font_condition_18
    size: 18
    bpp: 4
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz :&@!,.?\"'%()+-_/°"

  - file: "gfonts://Elms+Sans@400"
    id: font_condition_16
    size: 16
    bpp: 4
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz :&@!,.?\"'%()+-_/°"

  - file: "gfonts://Elms+Sans@400"
    id: font_condition_14
    size: 14
    bpp: 4
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz :&@!,.?\"'%()+-_/°"

  - file: "gfonts://Elms+Sans@400"
    id: font_condition_12
    size: 12
    bpp: 4
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz :&@!,.?\"'%()+-_/°"

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_weather_icon
    size: 28
    bpp: 4
    glyphsets: []
    glyphs:
      - "\U000F0590" # mdi-weather-cloudy
      - "\U000F0591" # mdi-weather-fog
      - "\U000F0592" # mdi-weather-hail
      - "\U000F0593" # mdi-weather-lightning
      - "\U000F0594" # mdi-weather-night
      - "\U000F0595" # mdi-weather-partly-cloudy
      - "\U000F0596" # mdi-weather-pouring
      - "\U000F0597" # mdi-weather-rainy
      - "\U000F0598" # mdi-weather-snowy
      - "\U000F0599" # mdi-weather-sunny
      - "\U000F059D" # mdi-weather-windy
      - "\U000F059E" # mdi-weather-windy-variant
      - "\U000F067E" # mdi-weather-lightning-rainy
      - "\U000F067F" # mdi-weather-snowy-rainy
      - "\U000F0F31" # mdi-weather-night-partly-cloudy
      - "\U000F002A" # mdi-alert-outline

globals:
  - id: is_night
    type: bool
    restore_value: no
    initial_value: 'false'

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - script.execute: update_display

image:
  - file: "images/background.png"
    id: bg_image
    type: RGB565
    resize: 320x240

text_sensor:
  - platform: homeassistant
    id: weather_summary
    entity_id: sensor.pirateweather_minutely_summary
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: weather_condition
    entity_id: weather.pirateweather
    on_value:
      then:
        - script.execute: update_display

sensor:
  - platform: homeassistant
    id: outdoor_temp
    entity_id: weather.pirateweather
    attribute: temperature
    on_value:
      then:
        - script.execute: update_display

script:
  - id: update_display
    mode: restart
    then:
      - lambda: |-
          auto now = id(ha_time).now();
          if (!now.is_valid()) return;

          bool night = (now.hour < 7 || now.hour >= 21);
          id(is_night) = night;

          // Clock moved higher.
          lv_obj_set_width(id(lbl_time), 320);
          lv_obj_set_height(id(lbl_time), 95);
          lv_label_set_long_mode(id(lbl_time), LV_LABEL_LONG_CLIP);
          lv_obj_align(id(lbl_time), LV_ALIGN_TOP_MID, 0, 15);

          // Weather condition uses almost the full width.
          lv_obj_set_width(id(lbl_condition), 300);
          lv_obj_set_height(id(lbl_condition), 34);
          lv_label_set_long_mode(id(lbl_condition), LV_LABEL_LONG_DOT);
          lv_obj_align(id(lbl_condition), LV_ALIGN_TOP_MID, 0, 125);

          // Day bottom-left.
          lv_obj_set_width(id(lbl_day), 140);
          lv_obj_set_height(id(lbl_day), 28);
          lv_label_set_long_mode(id(lbl_day), LV_LABEL_LONG_DOT);
          lv_obj_align(id(lbl_day), LV_ALIGN_BOTTOM_LEFT, 20, -20);

          // Smaller weather icon, closer to temperature.
          lv_obj_set_width(id(lbl_weather_icon), 32);
          lv_obj_set_height(id(lbl_weather_icon), 32);
          lv_label_set_long_mode(id(lbl_weather_icon), LV_LABEL_LONG_CLIP);
          lv_obj_align(id(lbl_weather_icon), LV_ALIGN_BOTTOM_RIGHT, -74, -16);

          // Temperature bottom-right.
          lv_obj_set_width(id(lbl_temp), 78);
          lv_obj_set_height(id(lbl_temp), 28);
          lv_label_set_long_mode(id(lbl_temp), LV_LABEL_LONG_DOT);
          lv_obj_align(id(lbl_temp), LV_ALIGN_BOTTOM_RIGHT, -20, -20);

          // Background.
          if (night) {
            lv_obj_set_style_bg_color(id(bg_panel), lv_color_hex(0x000000), 0);
            lv_obj_add_flag(id(bg_img), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_set_style_bg_color(id(bg_panel), lv_color_hex(0xFFFFFF), 0);
            lv_obj_clear_flag(id(bg_img), LV_OBJ_FLAG_HIDDEN);
          }

          // Text colors.
          uint32_t day_text = 0x230C0F;

          uint32_t main_text = night ? 0xFFFFFF : day_text;
          uint32_t sub_text = night ? 0x666666 : day_text;
          uint32_t accent_text = night ? 0xF5A623 : day_text;

          // Time.
          char time_buf[6];
          snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
          lv_label_set_text(id(lbl_time), time_buf);
          lv_obj_set_style_text_color(id(lbl_time), lv_color_hex(main_text), 0);

          // Day.
          const char* days[] = {
            "Sunday", "Monday", "Tuesday", "Wednesday",
            "Thursday", "Friday", "Saturday"
          };

          if (now.day_of_week >= 1 && now.day_of_week <= 7) {
            lv_label_set_text(id(lbl_day), days[now.day_of_week - 1]);
          }

          lv_obj_set_style_text_color(id(lbl_day), lv_color_hex(sub_text), 0);

          // Weather icon from Home Assistant weather state.
          std::string condition = id(weather_condition).state;

          const char *weather_icon = night ? "\U000F0594" : "\U000F0599";

          if (condition == "clear-night") {
            weather_icon = "\U000F0594";
          } else if (condition == "cloudy") {
            weather_icon = "\U000F0590";
          } else if (condition == "fog") {
            weather_icon = "\U000F0591";
          } else if (condition == "hail") {
            weather_icon = "\U000F0592";
          } else if (condition == "lightning") {
            weather_icon = "\U000F0593";
          } else if (condition == "lightning-rainy") {
            weather_icon = "\U000F067E";
          } else if (condition == "partlycloudy") {
            weather_icon = night ? "\U000F0F31" : "\U000F0595";
          } else if (condition == "pouring") {
            weather_icon = "\U000F0596";
          } else if (condition == "rainy") {
            weather_icon = "\U000F0597";
          } else if (condition == "snowy") {
            weather_icon = "\U000F0598";
          } else if (condition == "snowy-rainy") {
            weather_icon = "\U000F067F";
          } else if (condition == "sunny") {
            weather_icon = night ? "\U000F0594" : "\U000F0599";
          } else if (condition == "windy") {
            weather_icon = "\U000F059D";
          } else if (condition == "windy-variant") {
            weather_icon = "\U000F059E";
          } else if (condition == "exceptional") {
            weather_icon = "\U000F002A";
          }

          lv_label_set_text(id(lbl_weather_icon), weather_icon);
          lv_obj_set_style_text_color(id(lbl_weather_icon), lv_color_hex(sub_text), 0);

          // Weather summary.
          std::string summary = id(weather_summary).state;

          if (
            summary.empty() ||
            summary == "unknown" ||
            summary == "unavailable"
          ) {
            summary = "Loading...";
          }

          // Dynamically select the largest condition font that fits.
          const int32_t condition_width = 300;

          auto text_width = [&](const esphome::font::Font *font) -> int32_t {
            lv_point_t measured_size;
            lv_text_get_size(
              &measured_size,
              summary.c_str(),
              font->get_lv_font(),
              0,
              0,
              LV_COORD_MAX,
              LV_TEXT_FLAG_NONE
            );
            return measured_size.x;
          };

          const esphome::font::Font *condition_font = id(font_condition_12);

          if (text_width(id(font_condition_18)) <= condition_width) {
            condition_font = id(font_condition_18);
          } else if (text_width(id(font_condition_16)) <= condition_width) {
            condition_font = id(font_condition_16);
          } else if (text_width(id(font_condition_14)) <= condition_width) {
            condition_font = id(font_condition_14);
          } else {
            condition_font = id(font_condition_12);
          }

          lv_obj_set_style_text_font(id(lbl_condition), condition_font->get_lv_font(), 0);
          lv_label_set_text(id(lbl_condition), summary.c_str());
          lv_obj_set_style_text_color(id(lbl_condition), lv_color_hex(accent_text), 0);

          // Temperature.
          if (!isnan(id(outdoor_temp).state)) {
            char temp_buf[10];
            snprintf(temp_buf, sizeof(temp_buf), "%.0f°C", id(outdoor_temp).state);
            lv_label_set_text(id(lbl_temp), temp_buf);
          } else {
            lv_label_set_text(id(lbl_temp), "");
          }

          lv_obj_set_style_text_color(id(lbl_temp), lv_color_hex(sub_text), 0);

      - light.turn_on:
          id: back_light
          brightness: !lambda "return id(is_night) ? 0.3f : 1.0f;"

lvgl:
  displays:
    - my_display

  touchscreens:
    - touchscreen_id: ts_touch

  rotation: 90

  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - container:
            id: bg_panel
            x: 0
            y: 0
            width: 320
            height: 240
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: 'OFF'
            clickable: false
            widgets:
              - image:
                  id: bg_img
                  src: bg_image
                  align: TOP_LEFT
                  x: 0
                  y: 0

              - label:
                  id: lbl_time
                  align: TOP_MID
                  y: 15
                  width: 320
                  height: 95
                  text: "00:00"
                  text_font: font_time
                  text_color: 0x230C0F
                  text_align: CENTER
                  long_mode: CLIP

              - label:
                  id: lbl_condition
                  align: TOP_MID
                  y: 125
                  width: 300
                  height: 34
                  text: "Loading..."
                  text_font: font_condition_18
                  text_color: 0x230C0F
                  text_align: CENTER
                  long_mode: DOT

              - label:
                  id: lbl_day
                  align: BOTTOM_LEFT
                  x: 20
                  y: -20
                  width: 140
                  height: 26
                  text: ""
                  text_font: font_sub
                  text_color: 0x230C0F
                  text_align: LEFT
                  long_mode: DOT

              - label:
                  id: lbl_weather_icon
                  align: BOTTOM_RIGHT
                  x: -74
                  y: -16
                  width: 32
                  height: 32
                  text: "\U000F0599"
                  text_font: font_weather_icon
                  text_color: 0x230C0F
                  text_align: CENTER
                  long_mode: CLIP

              - label:
                  id: lbl_temp
                  align: BOTTOM_RIGHT
                  x: -20
                  y: -20
                  width: 78
                  height: 26
                  text: ""
                  text_font: font_sub
                  text_color: 0x230C0F
                  text_align: RIGHT
                  long_mode: DOT
