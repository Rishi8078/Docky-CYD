esphome:
  name: esphome-web-c042c4
  friendly_name: Docky

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret smartdisplay_api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  - id: lcd
    clk_pin: GPIO14
    mosi_pin: GPIO13

  - id: touch_bus
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

output:
  - platform: ledc
    pin: GPIO21
    id: gpio_backlight_pwm

  - platform: ledc
    id: rgb_led_red
    pin: GPIO4
    inverted: true

  - platform: ledc
    id: rgb_led_green
    pin: GPIO16
    inverted: true

  - platform: ledc
    id: rgb_led_blue
    pin: GPIO17
    inverted: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Docky Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

  - platform: rgb
    name: "Docky RGB LED"
    id: docky_rgb_led
    red: rgb_led_red
    green: rgb_led_green
    blue: rgb_led_blue
    restore_mode: ALWAYS_OFF

display:
  - platform: mipi_spi
    id: my_display
    spi_id: lcd
    model: ESP32-2432S028-7789
    cs_pin:
      number: GPIO15
      ignore_strapping_warning: true
    dc_pin:
      number: GPIO2
      ignore_strapping_warning: true
    reset_pin:
      number: GPIO12
      ignore_strapping_warning: true
    color_order: bgr
    invert_colors: false
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: xpt2046
    id: ts_touch
    display: my_display
    spi_id: touch_bus
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false

binary_sensor:
  - platform: gpio
    id: btn_lights_page
    name: "Lights Page Button"
    pin:
      number: GPIO22
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_multi_click:
      - timing:
          - ON for at most 700ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: return id(showing_lights_page) || id(showing_transport_page) || id(showing_washing_page);
              then:
                - lambda: |-
                    id(showing_lights_page) = false;
                    id(showing_transport_page) = false;
                    id(showing_washing_page) = false;
                - script.execute: update_display
                - lvgl.page.show: main_page
              else:
                - lambda: |-
                    id(showing_lights_page) = true;
                    id(showing_transport_page) = false;
                    id(showing_washing_page) = false;
                - script.execute: update_display
                - lvgl.page.show: lights_page

      - timing:
          - ON for at least 700ms
        then:
          - if:
              condition:
                lambda: return id(showing_lights_page) || id(showing_transport_page) || id(showing_washing_page);
              then:
                - lambda: |-
                    id(showing_transport_page) = false;
                    id(showing_lights_page) = false;
                    id(showing_washing_page) = false;
                - script.execute: update_display
                - lvgl.page.show: main_page
              else:
                - lambda: |-
                    id(showing_transport_page) = true;
                    id(showing_lights_page) = false;
                    id(showing_washing_page) = false;
                - script.execute: update_display
                - lvgl.page.show: transport_page

  - platform: gpio
    id: gpio27_input
    name: "Washing Page Button"
    pin:
      number: GPIO27
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - if:
            condition:
              lambda: return id(showing_lights_page) || id(showing_transport_page) || id(showing_washing_page);
            then:
              - lambda: |-
                  id(showing_lights_page) = false;
                  id(showing_transport_page) = false;
                  id(showing_washing_page) = false;
              - script.execute: update_display
              - lvgl.page.show: main_page
            else:
              - lambda: |-
                  id(showing_lights_page) = false;
                  id(showing_transport_page) = false;
                  id(showing_washing_page) = true;
              - script.execute: update_display
              - lvgl.page.show: washing_page

button:
  - platform: template
    name: "Docky Home"
    on_press:
      then:
        - lambda: |-
            id(showing_lights_page) = false;
            id(showing_transport_page) = false;
            id(showing_washing_page) = false;
        - script.execute: update_display
        - lvgl.page.show: main_page

  - platform: template
    name: "Docky Scenes"
    on_press:
      then:
        - lambda: |-
            id(showing_lights_page) = true;
            id(showing_transport_page) = false;
            id(showing_washing_page) = false;
        - script.execute: update_display
        - lvgl.page.show: lights_page

  - platform: template
    name: "Docky Transport"
    on_press:
      then:
        - lambda: |-
            id(showing_lights_page) = false;
            id(showing_transport_page) = true;
            id(showing_washing_page) = false;
        - script.execute: update_display
        - lvgl.page.show: transport_page

  - platform: template
    name: "Docky Washing"
    on_press:
      then:
        - lambda: |-
            id(showing_lights_page) = false;
            id(showing_transport_page) = false;
            id(showing_washing_page) = true;
        - script.execute: update_display
        - lvgl.page.show: washing_page

  - platform: template
    name: "Docky Rotate Display"
    on_press:
      then:
        - lambda: |-
            id(display_rotation) = (id(display_rotation) + 90) % 360;
        - if:
            condition:
              lambda: return id(display_rotation) == 0;
            then:
              - lvgl.display.set_rotation: 0
        - if:
            condition:
              lambda: return id(display_rotation) == 90;
            then:
              - lvgl.display.set_rotation: 90
        - if:
            condition:
              lambda: return id(display_rotation) == 180;
            then:
              - lvgl.display.set_rotation: 180
        - if:
            condition:
              lambda: return id(display_rotation) == 270;
            then:
              - lvgl.display.set_rotation: 270

