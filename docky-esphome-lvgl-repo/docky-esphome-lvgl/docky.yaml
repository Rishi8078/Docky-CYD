globals:
  - id: is_night
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: showing_lights_page
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: showing_transport_page
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: showing_washing_page
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: display_rotation
    type: int
    restore_value: no
    initial_value: '90'

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - script.execute: update_display

image:
  - file: "images/background.png"
    id: bg_image
    type: RGB565
    resize: 320x240

  - file: "images/background_night.png"
    id: bg_image_night
    type: RGB565
    resize: 320x240

text_sensor:
  - platform: homeassistant
    id: sun_state
    entity_id: sun.sun
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: weather_summary
    entity_id: sensor.pirateweather_minutely_summary
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: weather_condition
    entity_id: weather.pirateweather
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: transport_s1_direction
    entity_id: sensor.next_s1_from_berliner_tor
    attribute: direction
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: washing_machine_46083
    entity_id: sensor.washing_machine_46083
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: washing_machine_46084
    entity_id: sensor.washing_machine_46084
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: washing_machine_46085
    entity_id: sensor.washing_machine_46085
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: washing_machine_46086
    entity_id: sensor.washing_machine_46086
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: washing_machine_46087
    entity_id: sensor.washing_machine_46087
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: washing_machine_46088
    entity_id: sensor.washing_machine_46088
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: washing_machine_46118
    entity_id: sensor.washing_machine_46118
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: washing_machine_46117
    entity_id: sensor.washing_machine_46117
    on_value:
      then:
        - script.execute: update_display

sensor:
  - platform: adc
    pin: GPIO34
    id: ambient_light
    name: "Docky Ambient Light"
    attenuation: 12db
    update_interval: 5s

  - platform: homeassistant
    id: transport_s1_minutes
    entity_id: sensor.next_s1_from_berliner_tor
    attribute: minutes_until
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: transport_s1_delay
    entity_id: sensor.next_s1_from_berliner_tor
    attribute: delay
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: indoor_temp
    entity_id: sensor.40_b7_fc_18_ba_42_ba42_temperature
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: indoor_humidity
    entity_id: sensor.40_b7_fc_18_ba_42_ba42_humidity
    on_value:
      then:
        - script.execute: update_display

  - platform: homeassistant
    id: outdoor_temp
    entity_id: weather.pirateweather
    attribute: temperature
    on_value:
      then:
        - script.execute: update_display

script:
  - id: update_display
    mode: restart
    then:
      - lambda: |-
          auto now = id(ha_time).now();
          if (!now.is_valid()) return;

          std::string sun = id(sun_state).state;

          if (sun == "below_horizon") {
            id(is_night) = true;
          } else if (sun == "above_horizon") {
            id(is_night) = false;
          } else {
            id(is_night) = (now.hour < 7 || now.hour >= 21);
          }

      - if:
          condition:
            lambda: return id(is_night);
          then:
            - lvgl.image.update:
                id: bg_img
                src: bg_image_night
            - lvgl.image.update:
                id: lights_bg_img
                src: bg_image_night
            - lvgl.image.update:
                id: transport_bg_img
                src: bg_image_night
            - lvgl.image.update:
                id: washing_bg_img
                src: bg_image_night
          else:
            - lvgl.image.update:
                id: bg_img
                src: bg_image
            - lvgl.image.update:
                id: lights_bg_img
                src: bg_image
            - lvgl.image.update:
                id: transport_bg_img
                src: bg_image
            - lvgl.image.update:
                id: washing_bg_img
                src: bg_image

      - lambda: |-
          auto now = id(ha_time).now();
          if (!now.is_valid()) return;

          bool night = id(is_night);

          // Header bar
          lv_obj_set_width(id(header_panel), 320);
          lv_obj_set_height(id(header_panel), 44);
          lv_obj_align(id(header_panel), LV_ALIGN_TOP_LEFT, 0, 0);
          lv_obj_set_style_bg_opa(id(header_panel), LV_OPA_TRANSP, 0);

          lv_obj_set_width(id(lbl_greeting), 200);
          lv_obj_set_height(id(lbl_greeting), 24);
          lv_obj_set_height(id(lbl_indoor_header), 24);
          lv_label_set_long_mode(id(lbl_indoor_header), LV_LABEL_LONG_CLIP);

          // Clock — shifted down to clear the header
          lv_obj_set_width(id(lbl_time), 320);
          lv_obj_set_height(id(lbl_time), 95);
          lv_label_set_long_mode(id(lbl_time), LV_LABEL_LONG_CLIP);
          lv_obj_align(id(lbl_time), LV_ALIGN_TOP_MID, 0, 46);

          // Weather condition
          lv_obj_set_width(id(lbl_condition), 300);
          lv_obj_set_height(id(lbl_condition), 34);
          lv_label_set_long_mode(id(lbl_condition), LV_LABEL_LONG_DOT);
          lv_obj_align(id(lbl_condition), LV_ALIGN_TOP_MID, 0, 157);

          // Footer bar
          lv_obj_set_width(id(footer_panel), 320);
          lv_obj_set_height(id(footer_panel), 51);
          lv_obj_set_pos(id(footer_panel), 0, 189);
          lv_obj_set_style_bg_opa(id(footer_panel), LV_OPA_TRANSP, 0);

          // Day — left side of footer (relative to footer_panel)
          lv_obj_set_width(id(lbl_day), 140);
          lv_obj_set_height(id(lbl_day), 22);
          lv_label_set_long_mode(id(lbl_day), LV_LABEL_LONG_DOT);

          // Weather icon — right side of footer (relative to footer_panel)
          lv_obj_set_width(id(lbl_weather_icon), 30);
          lv_obj_set_height(id(lbl_weather_icon), 30);
          lv_label_set_long_mode(id(lbl_weather_icon), LV_LABEL_LONG_CLIP);
          lv_obj_set_style_text_align(id(lbl_weather_icon), LV_TEXT_ALIGN_RIGHT, 0);
          lv_obj_set_style_translate_y(id(lbl_weather_icon), 4, 0);

          // Temperature — rightmost in footer (relative to footer_panel)
          lv_obj_set_height(id(lbl_temp), 22);
          lv_label_set_long_mode(id(lbl_temp), LV_LABEL_LONG_DOT);

          // Background
          if (night) {
            lv_obj_set_style_bg_color(id(bg_panel), lv_color_hex(0x000000), 0);
            lv_obj_set_style_bg_color(id(lights_panel), lv_color_hex(0x000000), 0);
            lv_obj_set_style_bg_color(id(transport_panel), lv_color_hex(0x000000), 0);
            lv_obj_set_style_bg_color(id(washing_panel), lv_color_hex(0x000000), 0);
          } else {
            lv_obj_set_style_bg_color(id(bg_panel), lv_color_hex(0xFFFFFF), 0);
            lv_obj_set_style_bg_color(id(lights_panel), lv_color_hex(0xFFFFFF), 0);
            lv_obj_set_style_bg_color(id(transport_panel), lv_color_hex(0xFFFFFF), 0);
            lv_obj_set_style_bg_color(id(washing_panel), lv_color_hex(0xFFFFFF), 0);
          }

          lv_obj_clear_flag(id(bg_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(lights_bg_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(transport_bg_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(washing_bg_img), LV_OBJ_FLAG_HIDDEN);

          // Text colors
          uint32_t day_text = 0x230C0F;

          uint32_t main_text = night ? 0xFFFFFF : day_text;
          uint32_t sub_text = night ? 0xFFFFFF : day_text;
          uint32_t accent_text = night ? 0xFFFFFF : day_text;

          // Time
          char time_buf[6];
          snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
          lv_label_set_text(id(lbl_time), time_buf);
          lv_obj_set_style_text_color(id(lbl_time), lv_color_hex(main_text), 0);

          // Day
          const char* days[] = {
            "Sunday", "Monday", "Tuesday", "Wednesday",
            "Thursday", "Friday", "Saturday"
          };

          if (now.day_of_week >= 1 && now.day_of_week <= 7) {
            lv_label_set_text(id(lbl_day), days[now.day_of_week - 1]);
          }

          lv_obj_set_style_text_color(id(lbl_day), lv_color_hex(sub_text), 0);

          // Greeting
          lv_label_set_text(id(lbl_greeting), "Hi Rishi");
          lv_obj_set_style_text_color(id(lbl_greeting), lv_color_hex(sub_text), 0);

          // Indoor climate
          bool has_indoor_temp = !isnan(id(indoor_temp).state);
          bool has_indoor_humidity = !isnan(id(indoor_humidity).state);

          if (has_indoor_temp && has_indoor_humidity) {
            char indoor_buf[16];
            snprintf(
              indoor_buf,
              sizeof(indoor_buf),
              "%.0f° %.0f%%",
              id(indoor_temp).state,
              id(indoor_humidity).state
            );
            lv_label_set_text(id(lbl_indoor_header), indoor_buf);
          } else if (has_indoor_temp) {
            char indoor_buf[8];
            snprintf(indoor_buf, sizeof(indoor_buf), "%.0f°", id(indoor_temp).state);
            lv_label_set_text(id(lbl_indoor_header), indoor_buf);
          } else if (has_indoor_humidity) {
            char indoor_buf[8];
            snprintf(indoor_buf, sizeof(indoor_buf), "%.0f%%", id(indoor_humidity).state);
            lv_label_set_text(id(lbl_indoor_header), indoor_buf);
          } else {
            lv_label_set_text(id(lbl_indoor_header), "");
          }

          lv_obj_set_style_text_color(id(lbl_indoor_header), lv_color_hex(sub_text), 0);

          // Weather icon from Home Assistant weather state
          std::string condition = id(weather_condition).state;

          const char *weather_icon = night ? "\U000F0594" : "\U000F0599";

          if (condition == "clear-night") {
            weather_icon = "\U000F0594";
          } else if (condition == "cloudy") {
            weather_icon = "\U000F0590";
          } else if (condition == "fog") {
            weather_icon = "\U000F0591";
          } else if (condition == "hail") {
            weather_icon = "\U000F0592";
          } else if (condition == "lightning") {
            weather_icon = "\U000F0593";
          } else if (condition == "lightning-rainy") {
            weather_icon = "\U000F067E";
          } else if (condition == "partlycloudy") {
            weather_icon = night ? "\U000F0F31" : "\U000F0595";
          } else if (condition == "pouring") {
            weather_icon = "\U000F0596";
          } else if (condition == "rainy") {
            weather_icon = "\U000F0597";
          } else if (condition == "snowy") {
            weather_icon = "\U000F0598";
          } else if (condition == "snowy-rainy") {
            weather_icon = "\U000F067F";
          } else if (condition == "sunny") {
            weather_icon = night ? "\U000F0594" : "\U000F0599";
          } else if (condition == "windy") {
            weather_icon = "\U000F059D";
          } else if (condition == "windy-variant") {
            weather_icon = "\U000F059E";
          } else if (condition == "exceptional") {
            weather_icon = "\U000F002A";
          }

          lv_label_set_text(id(lbl_weather_icon), weather_icon);

          // Weather icon now matches temperature color
          lv_obj_set_style_text_color(id(lbl_weather_icon), lv_color_hex(sub_text), 0);

          // Weather summary
          std::string summary = id(weather_summary).state;

          if (
            summary.empty() ||
            summary == "unknown" ||
            summary == "unavailable"
          ) {
            summary = "Loading...";
          }

          // Dynamically select the largest condition font that fits.
          const int32_t condition_width = 300;

          auto text_width = [&](const esphome::font::Font *font) -> int32_t {
            lv_point_t measured_size;
            lv_text_get_size(
              &measured_size,
              summary.c_str(),
              font->get_lv_font(),
              0,
              0,
              LV_COORD_MAX,
              LV_TEXT_FLAG_NONE
            );
            return measured_size.x;
          };

          const esphome::font::Font *condition_font = id(font_condition_12);

          if (text_width(id(font_condition_18)) <= condition_width) {
            condition_font = id(font_condition_18);
          } else if (text_width(id(font_condition_16)) <= condition_width) {
            condition_font = id(font_condition_16);
          } else if (text_width(id(font_condition_14)) <= condition_width) {
            condition_font = id(font_condition_14);
          } else {
            condition_font = id(font_condition_12);
          }

          lv_obj_set_style_text_font(id(lbl_condition), condition_font->get_lv_font(), 0);
          lv_label_set_text(id(lbl_condition), summary.c_str());
          lv_obj_set_style_text_color(id(lbl_condition), lv_color_hex(accent_text), 0);

          // Temperature
          if (!isnan(id(outdoor_temp).state)) {
            char temp_buf[10];
            snprintf(temp_buf, sizeof(temp_buf), "%.0f°C", id(outdoor_temp).state);
            lv_label_set_text(id(lbl_temp), temp_buf);
          } else {
            lv_label_set_text(id(lbl_temp), "");
          }

          lv_obj_set_style_text_color(id(lbl_temp), lv_color_hex(sub_text), 0);

          // Transportation
          auto update_transport_card = [](
            lv_obj_t *eta_label,
            lv_obj_t *status_label,
            lv_obj_t *direction_label,
            float minutes,
            float delay_seconds,
            const std::string &direction
          ) {
            if (isnan(minutes)) {
              lv_label_set_text(eta_label, "-");
              lv_label_set_text(status_label, "Unavailable");
              lv_label_set_text(direction_label, "-");
              lv_obj_set_style_text_color(status_label, lv_color_hex(0x8A8A8A), 0);
              return;
            }

            char eta_buf[12];
            if (minutes <= 0) {
              snprintf(eta_buf, sizeof(eta_buf), "Now");
            } else {
              snprintf(eta_buf, sizeof(eta_buf), "%.0fmin", minutes);
            }

            lv_label_set_text(eta_label, eta_buf);
            lv_label_set_text(direction_label, direction.empty() ? "-" : direction.c_str());

            int delay_minutes = isnan(delay_seconds) ? 0 : (int) roundf(delay_seconds / 60.0f);
            if (delay_minutes > 0) {
              char status_buf[8];
              snprintf(status_buf, sizeof(status_buf), "+%d", delay_minutes);
              lv_label_set_text(status_label, status_buf);
              lv_obj_set_style_text_color(status_label, lv_color_hex(0xFF5A5F), 0);
            } else {
              lv_label_set_text(status_label, "On Time");
              lv_obj_set_style_text_color(status_label, lv_color_hex(0x36D676), 0);
            }
          };

          lv_label_set_text(id(lbl_transport_line), "S1");
          lv_obj_set_style_bg_color(id(pill_transport_line), lv_color_hex(0x1A962B), 0);

          update_transport_card(
            id(lbl_transport_eta),
            id(lbl_transport_status),
            id(lbl_transport_direction),
            id(transport_s1_minutes).state,
            id(transport_s1_delay).state,
            id(transport_s1_direction).state
          );

          // Washing machines
          lv_obj_set_style_text_color(id(lbl_washing_title), lv_color_hex(sub_text), 0);

          auto update_washing_card = [](
            lv_obj_t *card,
            lv_obj_t *name_label,
            lv_obj_t *icon_label,
            lv_obj_t *state_label,
            const char *name,
            const std::string &state
          ) {
            lv_label_set_text(name_label, name);
            lv_anim_del(icon_label, nullptr);
            lv_obj_set_style_translate_x(icon_label, 0, 0);

            auto start_wash_shake = [](lv_obj_t *obj) {
              lv_anim_t anim;
              lv_anim_init(&anim);
              lv_anim_set_var(&anim, obj);
              lv_anim_set_values(&anim, -2, 2);
              lv_anim_set_time(&anim, 90);
              lv_anim_set_playback_time(&anim, 90);
              lv_anim_set_repeat_count(&anim, LV_ANIM_REPEAT_INFINITE);
              lv_anim_set_path_cb(&anim, lv_anim_path_ease_in_out);
              lv_anim_set_exec_cb(&anim, [](void *target, int32_t value) {
                lv_obj_set_style_translate_x((lv_obj_t *) target, value, 0);
              });
              lv_anim_start(&anim);
            };

            if (state == "AVAILABLE") {
              lv_label_set_text(icon_label, "\U000F072A");
              lv_label_set_text(state_label, "Free");
              lv_obj_set_style_bg_color(card, lv_color_hex(0x171717), 0);
              lv_obj_set_style_border_color(card, lv_color_hex(0x3A3A3A), 0);
              lv_obj_set_style_text_color(icon_label, lv_color_hex(0x8E8E8E), 0);
              lv_obj_set_style_text_color(state_label, lv_color_hex(0xA0A0A0), 0);
            } else if (state == "OCCUPIED") {
              lv_label_set_text(icon_label, "\U000F072A");
              lv_label_set_text(state_label, "Washing");
              lv_obj_set_style_bg_color(card, lv_color_hex(0x301A1C), 0);
              lv_obj_set_style_border_color(card, lv_color_hex(0xE57373), 0);
              lv_obj_set_style_text_color(icon_label, lv_color_hex(0xE57373), 0);
              lv_obj_set_style_text_color(state_label, lv_color_hex(0xE57373), 0);
              start_wash_shake(icon_label);
            } else if (state == "STOPPABLE") {
              lv_label_set_text(icon_label, "\U000F11BC");
              lv_label_set_text(state_label, "Your Wash");
              lv_obj_set_style_bg_color(card, lv_color_hex(0x302812), 0);
              lv_obj_set_style_border_color(card, lv_color_hex(0xFFD54F), 0);
              lv_obj_set_style_text_color(icon_label, lv_color_hex(0xFFD54F), 0);
              lv_obj_set_style_text_color(state_label, lv_color_hex(0xFFD54F), 0);
            } else {
              lv_label_set_text(icon_label, "\U000F072A");
              lv_label_set_text(state_label, "Unknown");
              lv_obj_set_style_bg_color(card, lv_color_hex(0x141414), 0);
              lv_obj_set_style_border_color(card, lv_color_hex(0x303030), 0);
              lv_obj_set_style_text_color(icon_label, lv_color_hex(0x777777), 0);
              lv_obj_set_style_text_color(state_label, lv_color_hex(0x777777), 0);
            }

            lv_obj_set_style_text_color(name_label, lv_color_hex(0xC8C8C8), 0);
          };

          update_washing_card(id(card_washing_46083), id(lbl_washing_46083_name), id(lbl_washing_46083_icon), id(lbl_washing_46083_state), "46083", id(washing_machine_46083).state);
          update_washing_card(id(card_washing_46084), id(lbl_washing_46084_name), id(lbl_washing_46084_icon), id(lbl_washing_46084_state), "46084", id(washing_machine_46084).state);
          update_washing_card(id(card_washing_46085), id(lbl_washing_46085_name), id(lbl_washing_46085_icon), id(lbl_washing_46085_state), "46085", id(washing_machine_46085).state);
          update_washing_card(id(card_washing_46086), id(lbl_washing_46086_name), id(lbl_washing_46086_icon), id(lbl_washing_46086_state), "46086", id(washing_machine_46086).state);
          update_washing_card(id(card_washing_46087), id(lbl_washing_46087_name), id(lbl_washing_46087_icon), id(lbl_washing_46087_state), "46087", id(washing_machine_46087).state);
          update_washing_card(id(card_washing_46088), id(lbl_washing_46088_name), id(lbl_washing_46088_icon), id(lbl_washing_46088_state), "46088", id(washing_machine_46088).state);
          update_washing_card(id(card_washing_46118), id(lbl_washing_46118_name), id(lbl_washing_46118_icon), id(lbl_washing_46118_state), "46118", id(washing_machine_46118).state);
          update_washing_card(id(card_washing_46117), id(lbl_washing_46117_name), id(lbl_washing_46117_icon), id(lbl_washing_46117_state), "46117", id(washing_machine_46117).state);
